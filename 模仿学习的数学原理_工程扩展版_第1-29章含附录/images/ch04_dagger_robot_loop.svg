<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="600" y="48" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#111827">图4-3 DAgger 在机械臂任务中的数据闭环</text>

  <rect x="70" y="135" width="210" height="130" rx="18" fill="#eef2ff" stroke="#374151" stroke-width="2"/>
  <text x="175" y="175" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#111827">当前策略执行</text>
  <text x="175" y="210" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#374151">机械臂自己跑</text>
  <text x="175" y="238" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#374151">进入真实访问状态</text>

  <path d="M290 200 L405 200" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="348" y="178" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#374151">产生偏离</text>

  <rect x="420" y="135" width="210" height="130" rx="18" fill="#fff7ed" stroke="#9a3412" stroke-width="2"/>
  <text x="525" y="175" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#7c2d12">收集访问状态</text>
  <text x="525" y="210" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#7c2d12">末端偏了</text>
  <text x="525" y="238" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#7c2d12">目标相对位置变了</text>

  <path d="M640 200 L755 200" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="698" y="178" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#374151">请求专家</text>

  <rect x="770" y="135" width="210" height="130" rx="18" fill="#ecfdf5" stroke="#065f46" stroke-width="2"/>
  <text x="875" y="175" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#065f46">专家补标签</text>
  <text x="875" y="210" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#065f46">此时该怎么修正</text>
  <text x="875" y="238" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#065f46">得到 (o, a_E)</text>

  <path d="M875 275 L875 360" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="930" y="323" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#374151">聚合</text>

  <rect x="770" y="375" width="210" height="130" rx="18" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  <text x="875" y="415" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#111827">更新数据集</text>
  <text x="875" y="450" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#374151">D_i = D_{i-1} ∪ 新样本</text>
  <text x="875" y="478" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#374151">覆盖偏离与恢复状态</text>

  <path d="M760 440 L640 440" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="700" y="418" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#374151">再训练</text>

  <rect x="420" y="375" width="210" height="130" rx="18" fill="#f9fafb" stroke="#374151" stroke-width="2"/>
  <text x="525" y="415" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#111827">得到新策略</text>
  <text x="525" y="450" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#374151">π_{i+1}</text>
  <text x="525" y="478" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#374151">更会处理偏离状态</text>

  <path d="M410 440 L175 440 L175 280" stroke="#111827" stroke-width="3" fill="none" marker-end="url(#arrow)"/>
  <text x="270" y="420" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#374151">下一轮继续执行</text>

  <rect x="300" y="545" width="600" height="48" rx="14" fill="#fff7ed" stroke="#9a3412"/>
  <text x="600" y="575" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="17" fill="#7c2d12">关键：不是只增加数据量，而是把训练数据推向模型自己会遇到的分布</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
  </defs>
</svg>
