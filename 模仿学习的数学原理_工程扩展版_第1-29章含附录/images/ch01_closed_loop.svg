<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="440" viewBox="0 0 1100 440">
  <rect width="1100" height="440" fill="#ffffff"/>
  <text x="550" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#222">图1-2 动作会改变下一时刻观测：模仿学习的闭环结构</text>
  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#555"/>
    </marker>
  </defs>
  <g font-family="Arial, sans-serif" font-size="18" fill="#222">
    <rect x="85" y="150" width="180" height="82" rx="16" fill="#eef5ff" stroke="#3b73c4" stroke-width="2"/>
    <text x="175" y="184" text-anchor="middle" font-weight="700">当前观测 o_t</text>
    <text x="175" y="211" text-anchor="middle" font-size="15">图像、本体、夹爪状态</text>

    <line x1="265" y1="191" x2="345" y2="191" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="350" y="150" width="165" height="82" rx="16" fill="#f0f7ea" stroke="#5a9c36" stroke-width="2"/>
    <text x="432" y="184" text-anchor="middle" font-weight="700">策略 πθ</text>
    <text x="432" y="211" text-anchor="middle" font-size="15">根据观测选动作</text>

    <line x1="515" y1="191" x2="595" y2="191" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="600" y="150" width="165" height="82" rx="16" fill="#fff7e8" stroke="#d28a20" stroke-width="2"/>
    <text x="682" y="184" text-anchor="middle" font-weight="700">动作 a_t</text>
    <text x="682" y="211" text-anchor="middle" font-size="15">移动末端 / 控夹爪</text>

    <line x1="765" y1="191" x2="845" y2="191" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>

    <rect x="850" y="130" width="190" height="122" rx="16" fill="#f7f7f7" stroke="#777" stroke-width="2"/>
    <text x="945" y="172" text-anchor="middle" font-weight="700">环境变化</text>
    <text x="945" y="202" text-anchor="middle" font-size="15">机械臂位置变了</text>
    <text x="945" y="226" text-anchor="middle" font-size="15">物体相对位置变了</text>
  </g>
  <path d="M945 252 C945 335, 175 335, 175 236" fill="none" stroke="#555" stroke-width="2.5" marker-end="url(#arrow)"/>
  <text x="555" y="365" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" fill="#333">关键区别：普通监督学习的预测通常不改变下一条样本；机器人动作会改变下一时刻观测。</text>
  <text x="555" y="398" text-anchor="middle" font-family="Arial, sans-serif" font-size="17" fill="#666">因此，行为克隆看起来像监督学习，但部署时是闭环控制问题。</text>
</svg>