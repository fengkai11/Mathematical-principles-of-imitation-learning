<svg xmlns="http://www.w3.org/2000/svg" width="1100" height="430" viewBox="0 0 1100 430">
  <rect width="1100" height="430" fill="#ffffff"/>
  <text x="550" y="38" text-anchor="middle" font-family="Arial, sans-serif" font-size="26" font-weight="700" fill="#222">图1-3 动作、轨迹、策略的区别</text>
  <g font-family="Arial, sans-serif" fill="#222">
    <rect x="70" y="95" width="290" height="235" rx="18" fill="#fff7e8" stroke="#d28a20" stroke-width="2"/>
    <text x="215" y="135" text-anchor="middle" font-size="24" font-weight="700">单个动作</text>
    <text x="215" y="172" text-anchor="middle" font-size="18">a_t</text>
    <line x1="105" y1="190" x2="325" y2="190" stroke="#d28a20" stroke-width="1.5"/>
    <text x="215" y="225" text-anchor="middle" font-size="17">某一时刻专家做了什么</text>
    <text x="215" y="255" text-anchor="middle" font-size="17">太局部</text>
    <text x="215" y="285" text-anchor="middle" font-size="17">不能覆盖新情况</text>

    <rect x="405" y="95" width="290" height="235" rx="18" fill="#eef5ff" stroke="#3b73c4" stroke-width="2"/>
    <text x="550" y="135" text-anchor="middle" font-size="24" font-weight="700">一条轨迹</text>
    <text x="550" y="172" text-anchor="middle" font-size="18">tau</text>
    <line x1="440" y1="190" x2="660" y2="190" stroke="#3b73c4" stroke-width="1.5"/>
    <text x="550" y="225" text-anchor="middle" font-size="17">一次完整专家示范</text>
    <text x="550" y="255" text-anchor="middle" font-size="17">是训练材料</text>
    <text x="550" y="285" text-anchor="middle" font-size="17">不是最终能力</text>

    <rect x="740" y="95" width="290" height="235" rx="18" fill="#f0f7ea" stroke="#5a9c36" stroke-width="2"/>
    <text x="885" y="135" text-anchor="middle" font-size="24" font-weight="700">策略</text>
    <text x="885" y="172" text-anchor="middle" font-size="18">pi_theta</text>
    <line x1="775" y1="190" x2="995" y2="190" stroke="#5a9c36" stroke-width="1.5"/>
    <text x="885" y="225" text-anchor="middle" font-size="17">根据观测选择动作</text>
    <text x="885" y="255" text-anchor="middle" font-size="17">能处理变化情况</text>
    <text x="885" y="285" text-anchor="middle" font-size="17">是模仿学习目标</text>
  </g>
  <text x="550" y="375" text-anchor="middle" font-family="Arial, sans-serif" font-size="21" font-weight="700" fill="#333">本章核心：专家轨迹是训练材料，专家动作是局部标签，策略才是最终要学习的能力。</text>
</svg>