<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="620" viewBox="0 0 1200 620">
  <rect width="1200" height="620" fill="#ffffff"/>
  <text x="600" y="46" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="28" font-weight="700" fill="#111827">图2-1 行为克隆训练流程：专家轨迹到监督学习策略</text>

  <rect x="50" y="110" width="210" height="330" rx="18" fill="#f3f4f6" stroke="#374151" stroke-width="2"/>
  <text x="155" y="145" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#111827">专家示范轨迹</text>
  <text x="155" y="185" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#374151">遥操作机械臂</text>
  <text x="155" y="215" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#374151">完成抓取与放置</text>
  <path d="M95 300 C125 245, 175 245, 205 300" fill="none" stroke="#111827" stroke-width="5"/>
  <circle cx="95" cy="300" r="12" fill="#111827"/>
  <circle cx="205" cy="300" r="12" fill="#111827"/>
  <rect x="125" y="330" width="60" height="40" rx="6" fill="#e5e7eb" stroke="#111827"/>
  <text x="155" y="390" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#111827">τ = (o, a, ...)</text>

  <path d="M275 275 L370 275" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="322" y="253" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#374151">拆分</text>

  <rect x="380" y="110" width="230" height="330" rx="18" fill="#f9fafb" stroke="#374151" stroke-width="2"/>
  <text x="495" y="145" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#111827">观测—动作样本</text>
  <rect x="415" y="180" width="160" height="48" rx="10" fill="#ffffff" stroke="#6b7280"/>
  <text x="495" y="210" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#111827">(o₁, a₁)</text>
  <rect x="415" y="245" width="160" height="48" rx="10" fill="#ffffff" stroke="#6b7280"/>
  <text x="495" y="275" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#111827">(o₂, a₂)</text>
  <rect x="415" y="310" width="160" height="48" rx="10" fill="#ffffff" stroke="#6b7280"/>
  <text x="495" y="340" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#111827">...</text>
  <rect x="415" y="375" width="160" height="48" rx="10" fill="#ffffff" stroke="#6b7280"/>
  <text x="495" y="405" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="16" fill="#111827">(oₙ, aₙ)</text>

  <path d="M625 275 L720 275" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="672" y="253" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#374151">训练</text>

  <rect x="730" y="130" width="210" height="290" rx="18" fill="#eef2ff" stroke="#374151" stroke-width="2"/>
  <text x="835" y="165" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="20" font-weight="700" fill="#111827">策略模型</text>
  <rect x="770" y="210" width="130" height="80" rx="16" fill="#ffffff" stroke="#4b5563" stroke-width="2"/>
  <text x="835" y="245" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#111827">πθ 或 fθ</text>
  <text x="835" y="275" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#374151">输入 o，输出 a</text>
  <text x="835" y="345" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#374151">让预测动作接近专家动作</text>

  <path d="M955 275 L1045 275" stroke="#111827" stroke-width="3" marker-end="url(#arrow)"/>
  <text x="1000" y="253" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="15" fill="#374151">部署</text>

  <rect x="1055" y="130" width="110" height="290" rx="18" fill="#ecfdf5" stroke="#374151" stroke-width="2"/>
  <text x="1110" y="165" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" font-weight="700" fill="#111827">机械臂</text>
  <text x="1110" y="205" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="14" fill="#374151">闭环执行</text>
  <line x1="1110" y1="240" x2="1110" y2="330" stroke="#111827" stroke-width="6"/>
  <line x1="1110" y1="270" x2="1080" y2="315" stroke="#111827" stroke-width="6"/>
  <line x1="1110" y1="270" x2="1140" y2="315" stroke="#111827" stroke-width="6"/>
  <circle cx="1110" cy="235" r="14" fill="#111827"/>

  <rect x="315" y="485" width="570" height="58" rx="14" fill="#fff7ed" stroke="#9a3412"/>
  <text x="600" y="520" text-anchor="middle" font-family="Arial, 'Microsoft YaHei', sans-serif" font-size="18" fill="#7c2d12">核心：把专家动作当标签，最小化预测动作与专家动作的差距</text>

  <defs>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="10" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#111827"/>
    </marker>
  </defs>
</svg>
